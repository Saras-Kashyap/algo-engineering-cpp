name: Automated Testing

on: [push] 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Compile and Test
        run: |
          find src -name "solution.cpp" | while read sol; do
            dir=$(dirname "$sol")
            test_file="$dir/tests.txt"
            
          if [ -f "$test_file" ]; then
            echo "Testing $sol..."
            # Compile
            g++ -O2 "$sol" -o solution
            # Run against tests.txt (assuming tests.txt has input)
            ./solution < "$test_file"
            
            # Check if execution was successful
            if [ $? -ne 0 ]; then
              echo "Test failed for $sol"
              exit 1
            fi
          else
            echo "No tests.txt found for $sol, skipping."
          fi
        done