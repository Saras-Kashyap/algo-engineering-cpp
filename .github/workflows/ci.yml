name: Automated Testing

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Test
        run: |
          # Find all solution.cpp files
          find src -name "solution.cpp" | while read sol; do
            # Get the directory of the current solution file
            dir=$(dirname "$sol")
            
            # Look for tests.txt in the same directory
            test_file="$dir/tests.txt"
            
            if [ -f "$test_file" ]; then
              echo "-----------------------------------"
              echo "Testing: $sol"
              g++ -O2 "$sol" -o solution
              ./solution < "$test_file"
              if [ $? -eq 0 ]; then
                echo "SUCCESS: $sol passed."
              else
                echo "ERROR: Test failed for $sol"
                exit 1
              fi
            else
              echo "SKIP: No tests.txt found in $dir, skipping $sol"
            fi
          done
